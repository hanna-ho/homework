---
- name: Ensure firewalld is running and enabled
  ansible.builtin.service:
    name: "{{ firewall_service_name }}"
    state: started
    enabled: true

- name: Allow vhost port only from the trusted source network
  ansible.posix.firewalld:
    rich_rule: "rule family=ipv4 source address={{ allowed_source_network }} port port={{ vhost_port }} protocol=tcp accept"
    permanent: true
    immediate: true
    state: enabled
