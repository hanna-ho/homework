---
- name: Persist SELinux file context for HTML directory
  community.general.sefcontext:
    target: "{{ site_html_dir }}(/.*)?"
    setype: "{{ selinux_html_type }}"
    state: present

- name: Persist SELinux file context for logs directory
  community.general.sefcontext:
    target: "{{ site_logs_dir }}(/.*)?"
    setype: "{{ selinux_logs_type }}"
    state: present

- name: Persist SELinux port mapping for vhost port
  community.general.seport:
    ports: "{{ vhost_port }}"
    proto: tcp
    setype: "{{ selinux_port_type }}"
    state: present
